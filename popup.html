<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <img src="./icon.png" class="popup-icon" alt="dc add-on">
    <span class="popup-title">DC Add-on</span>
  </div>
  <div class="popup-body">
    <!-- Toggles -->
    <label class="popup-toggle" for="toggle-dview">
      <div class="popup-toggle-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
        <span>빠른글보기</span>
      </div>
      <input type="checkbox" id="toggle-dview" class="popup-switch-input">
      <span class="popup-switch"></span>
    </label>
    <label class="popup-toggle" for="toggle-autorefresh">
      <div class="popup-toggle-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        <span>자동 새로고침</span>
      </div>
      <input type="checkbox" id="toggle-autorefresh" class="popup-switch-input">
      <span class="popup-switch"></span>
    </label>
    <div class="popup-sub" id="refresh-interval-row">
      <span class="popup-sub-label">간격</span>
      <select id="refresh-interval" class="popup-select">
        <option value="5">5초</option>
        <option value="10" selected>10초</option>
        <option value="20">20초</option>
        <option value="30">30초</option>
        <option value="60">60초</option>
      </select>
    </div>

    <div class="popup-divider"></div>

    <!-- Action buttons -->
    <button class="popup-action" id="btn-block">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></svg>
      <span>차단</span>
    </button>
    <button class="popup-action" id="btn-rpick">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M16 8h.01"/><path d="M12 12h.01"/><path d="M8 16h.01"/></svg>
      <span>추첨</span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
